# Simulation parameters
# Used for transfer function generation for neural network analysis

# Execution configuration
execution:
  # Number of simulations
  num_simulations: 10000

  # Number of points of integration
  num_points: 10000

  # Target nodes (where data is extracted from)
  target_nodes: [4, 8, 12, 16, 20, 24, 28, 32, 36, 40]

  # Simulation outputs H(f) directly
  output_mode: "transfer_function"

# Domain randomization parameters
randomization:
  # Noise floor
  noise_min: 0.0005 # V
  noise_max: 0.002 # V

  # Thermal capacitance drift
  temp_drift: 0.02  # 2%

  # Tolerance reduction due to batches (divide tolerance by factor)
  L_batch_max: 5.0
  C_batch_max: 5.0

# Inverse-problem neural network (used by training / inference scripts)
neural_network:
  model_type: "2d"
  training:
    batch_size: 64
    epochs: 50
    learning_rate: 0.001
    train_split: 0.8
    seed: 0
    grad_clip_norm_1d: 1.0
    lr_scheduler_1d_factor: 0.5
    lr_scheduler_1d_patience: 3
  loss:
    noise_floor_threshold: 1.0e-4
    priority_factor: 5.0
  architecture:
    num_freq_bins: 160
    adaptive_pool_height: 5
    adaptive_pool_width: 10
    conv_channels: [32, 64, 128]
    dropout: 0.3
    regressor_hidden1: 1024
    regressor_hidden2: 512