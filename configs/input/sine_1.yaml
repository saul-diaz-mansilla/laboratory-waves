# Gaussian wavepacket input parameters
# Values used to configure AWG and to set up simulations

# Waveform to input
waveform: "sine"

# Number of sines
num_inputs: 50

# Oscilloscope AWG frequency 
awg_frequency: 500  # Hz

# Peak to peak voltage generated by oscilloscope
vpp: 5  # V

# Signal duration (1/awg_frequency)
duration: 0.002 # s

# Amplitude of gaussian envelope
amplitude: 2.5  # V

# First frequency of wavepacket
f_start: 2000  # Hz

# Last frequency of wavepacket
f_end: 140000  # Hz